<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>DocuSuite IT/OT</title>
    <style>
        /* Variables CSS para Modo Claro/Oscuro */
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --sidebar-bg: #f8fafc;
            --border-color: #e2e8f0;
            --primary: #0284c7;
        }
        [data-theme="dark"] {
            --bg-color: #0f172a;
            --text-color: #f1f5f9;
            --sidebar-bg: #1e293b;
            --border-color: #334155;
            --primary: #38bdf8;
        }
        
        body { margin: 0; display: flex; height: 100vh; background: var(--bg-color); color: var(--text-color); font-family: system-ui, -apple-system, sans-serif; transition: all 0.3s;}
        
        /* Layout Sidebar y Main */
        .sidebar { width: 250px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); padding: 20px; display: flex; flex-direction: column;}
        .sidebar a { color: var(--text-color); text-decoration: none; padding: 10px; margin-bottom: 5px; border-radius: 5px; display: block; }
        .sidebar a:hover { background: var(--border-color); }
        .main-content { flex-grow: 1; padding: 40px; overflow-y: auto; }
        
        /* Botones y UI */
        .btn { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; text-decoration: none;}
        .theme-toggle { margin-top: auto; cursor: pointer; padding: 10px; background: transparent; color: var(--text-color); border: 1px solid var(--border-color); border-radius: 5px;}
    </style>
</head>
<body>

   <nav class="sidebar">
        <div>
            <h2>DocuSuite</h2>
            <a href="/dashboard">📊 Dashboard Principal</a>
            <a href="/proyectos">📁 Gestión Proyectos</a>
            <a href="/documentos">📄 Gestión Documentos</a>
            <a href="/editor">📝 Nuevo Documento</a>
        </div>
        
        <div style="margin-top: auto; text-align: center;">
            <button class="theme-toggle" onclick="toggleTheme()" style="width: 100%; margin-bottom: 15px;">🌓 Alternar Tema</button>
            <div style="font-size: 0.85em; opacity: 0.6; margin-bottom: 5px;">
                &copy; 2006 Roberto Tejado<br>Todos los derechos reservados.
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script>
        // Lógica para alternar Modo Claro/Oscuro
        function toggleTheme() {
            const html = document.documentElement;
            if (html.getAttribute('data-theme') === 'dark') {
                html.setAttribute('data-theme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
            }
        }
    </script>
</body>
</html>
